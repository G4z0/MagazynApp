name: barcode_scanner
description: Aplikacja do skanowania kodów kreskowych - LogisticsERP

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Skaner kodów kreskowych (kamera)
  mobile_scanner: ^5.1.1

  # Zapytania HTTP do API
  http: ^1.2.1

  # Lokalna baza danych (kolejka offline)
  sqflite: ^2.3.0
  path: ^1.9.0

  # Monitoring połączenia sieciowego
  connectivity_plus: ^6.0.3

  # Ikony Material Design
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
